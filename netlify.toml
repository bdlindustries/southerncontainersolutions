[build]
  command = "npm install && npm run build"
  publish = "dist"

# Makes sure styling/build tools are always installed (fixes plain white “unstyled” site).
[build.environment]
  NPM_CONFIG_PRODUCTION = "false"
  # Pin Node here — do not rely on .nvmrc (Windows/Git can add CR and break Netlify).
  NODE_VERSION = "20"

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

# No catch-all to index.html — this app does not use URL routes; a /* rule can break /assets/* on some setups.
