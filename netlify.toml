[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# www → apex (non-www)
[[redirects]]
  from = "http://www.southerncontainersolutions.com/*"
  to = "https://southerncontainersolutions.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.southerncontainersolutions.com/*"
  to = "https://southerncontainersolutions.com/:splat"
  status = 301
  force = true

# Legacy URLs — force redirect even if a static file exists
[[redirects]]
  from = "/home"
  to = "/shop"
  status = 301
  force = true

[[redirects]]
  from = "/contact"
  to = "/shop"
  status = 301
  force = true

[[redirects]]
  from = "/container-conversion-cost"
  to = "/shop"
  status = 301
  force = true

[[redirects]]
  from = "/shipping-container-tiny-homes"
  to = "/shop"
  status = 301
  force = true

[[redirects]]
  from = "/container-office-vs-shed"
  to = "/shop"
  status = 301
  force = true

[[redirects]]
  from = "/container-office-interior-options"
  to = "/shop"
  status = 301
  force = true

[[redirects]]
  from = "/how-container-conversions-are-built"
  to = "/shop"
  status = 301
  force = true

[[redirects]]
  from = "/shipping-container-office-uses"
  to = "/shop"
  status = 301
  force = true

# Legacy service-areas → clean /locations structure
[[redirects]]
  from = "/service-areas"
  to = "/locations"
  status = 301
  force = true

[[redirects]]
  from = "/service-areas/*"
  to = "/locations/:splat"
  status = 301
  force = true

# Legacy static .html location pages → clean /locations paths
[[redirects]]
  from = "/locations/*.html"
  to = "/locations/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/service-areas/*.html"
  to = "/locations/:splat"
  status = 301
  force = true
